<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KLineMaster · 交易理论大集合</title>
<style>
:root{--bg:#0a0e27;--card:#111640;--border:#1e2a4a;--text:#c8d0e0;--gold:#f0c040;--accent:#4da6ff;--green:#34d399;--red:#fb7185;--purple:#a78bfa;--muted:#6b7daa;--dim:#8899bb}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.fb{padding:60px 20px;text-align:center}.fb h1{font-size:26px;color:var(--gold);margin-bottom:12px}.fb p{color:var(--dim);font-size:14px}
.dot{display:inline-block;width:10px;height:10px;background:var(--accent);border-radius:50%;margin:0 4px;animation:pl 1.2s infinite}.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pl{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
.app{display:none;max-width:1100px;margin:0 auto;padding:0 14px 40px}
.js-ready .fb{display:none}.js-ready .app{display:block}
.hd{padding:22px 0;text-align:center;border-bottom:1px solid var(--border);margin-bottom:16px}
.hd h1{font-size:30px;font-weight:800;color:var(--gold);letter-spacing:2px}
.hd .sub{color:var(--muted);font-size:13px;margin-top:2px}
.hd .sts{display:flex;justify-content:center;gap:22px;margin-top:10px;flex-wrap:wrap}
.si{text-align:center}.sn{font-size:22px;font-weight:800;color:var(--accent)}.sl{font-size:10px;color:var(--muted)}
.tbs{display:flex;gap:0;margin-bottom:16px;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.tb{flex:1;padding:12px 6px;border:none;background:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:.2s;text-align:center}
.tb:hover{color:var(--text);background:rgba(255,255,255,.03)}.tb.on{color:var(--gold);background:rgba(240,192,64,.08)}
.tb .ti{display:block;font-size:18px;margin-bottom:1px}
.pn{display:none}.pn.show{display:block}

/* stage cards */
.sc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px;transition:.2s}
.sc:hover{border-color:var(--accent)}
.sc .si2{font-size:32px;margin-bottom:4px}.sc .sn2{font-size:18px;font-weight:800;color:var(--gold)}.sc .ss{font-size:12px;color:var(--accent);margin-bottom:4px}
.sc .sd{font-size:12px;color:var(--dim);margin-bottom:10px;line-height:1.6}
.sc .sbs{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:inline-block;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(77,166,255,.12);color:var(--accent);border:1px solid rgba(77,166,255,.2);cursor:pointer;transition:.15s}
.chip:hover{background:rgba(77,166,255,.25)}.chip.read{background:rgba(52,211,153,.1);color:var(--green);border-color:rgba(52,211,153,.2)}
.sp{font-size:11px;color:var(--muted);margin-top:7px}.pb{height:3px;background:#1e2a4a;border-radius:2px;margin-top:2px;overflow:hidden}.pf{height:100%;background:var(--green);border-radius:2px;transition:.3s}

/* library */
.lc{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.ls{flex:1;min-width:150px;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px}
.ls:focus{outline:none;border-color:var(--accent)}
.lf{padding:9px 10px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;cursor:pointer}
.lg{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.bc{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px;cursor:pointer;transition:.15s;position:relative}
.bc:hover{border-color:var(--accent);transform:translateY(-1px)}.bc.done{opacity:.5}
.bc .bt{font-size:14px;font-weight:700;color:var(--gold)}.bc .ba{font-size:11px;color:var(--muted);margin-bottom:4px}
.bc .bs{font-size:11px;color:var(--dim);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px}
.bc .bm{display:flex;gap:10px;font-size:10px;color:var(--muted)}
.bc .bg{font-size:9px;padding:2px 7px;border-radius:8px;background:rgba(77,166,255,.12);color:var(--accent);position:absolute;top:10px;right:10px}
.bc .bp{font-size:9px;color:var(--green);margin-top:2px}

/* modal */
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.82);z-index:100;display:flex;align-items:center;justify-content:center;padding:12px;animation:fi .2s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.mc{background:var(--bg);border:1px solid var(--border);border-radius:16px;max-width:720px;width:100%;max-height:92vh;overflow-y:auto;position:relative}
.mh{position:sticky;top:0;background:var(--bg);padding:15px 18px;border-bottom:1px solid var(--border);z-index:10}
.mx{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mx:hover{border-color:var(--red);color:var(--red)}
.mt{font-size:18px;font-weight:800;color:var(--gold)}.ms{font-size:11px;color:var(--accent);margin-top:2px}
.br{display:flex;gap:5px;align-items:center;font-size:10px;color:var(--muted);margin-top:3px;flex-wrap:wrap}
.br a{color:var(--accent);cursor:pointer}.br span{color:var(--dim)}
.stbs{display:flex;gap:0;margin-top:8px}
.stb{flex:1;padding:7px;border:none;background:none;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:.2s;text-align:center}
.stb.on{color:var(--gold);border-bottom-color:var(--gold)}
.mb{padding:10px 18px 18px}

/* chapters */
.ci{margin-bottom:1px;border:1px solid var(--border);border-radius:9px;overflow:hidden;background:var(--card)}
.ch{padding:10px 14px;display:flex;align-items:center;gap:6px;cursor:pointer;transition:.15s}
.ch:hover{background:rgba(255,255,255,.03)}
.ch .cn{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;background:#1a2040;color:var(--muted)}
.ch .cn.done{background:rgba(52,211,153,.15);color:var(--green)}
.ch .ct{flex:1;font-size:12px;font-weight:600}
.ch .cl{font-size:9px;padding:1px 6px;border-radius:6px;font-weight:600;margin-right:4px}
.ch .cl.must{background:rgba(240,192,64,.15);color:var(--gold)}
.ch .cl.rec{background:rgba(77,166,255,.12);color:var(--accent)}
.ch .cl.opt{background:rgba(107,125,170,.12);color:var(--muted)}
.ch .ca{font-size:10px;color:var(--muted);transition:.2s}.ch.open .ca{transform:rotate(180deg)}
.cb{display:none;padding:0 14px 10px 42px}.cb.open{display:block}
.pti{margin-bottom:8px}
.ptt{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:2px}
.ptc{font-size:11px;color:var(--dim);line-height:1.5;margin-bottom:3px}
.ptd{font-size:11px;color:var(--text);line-height:1.6;margin-bottom:5px}
.hlb{border-left:3px solid;padding:5px 9px;margin:3px 0;border-radius:0 5px 5px 0;font-size:10px;line-height:1.5;background:rgba(255,255,255,.03)}
.hlb.g{border-color:var(--gold)}.hlb.b{border-color:var(--accent)}.hlb.r{border-color:var(--red)}.hlb.gr{border-color:var(--green)}.hlb.p{border-color:var(--purple)}

/* cards */
.kc{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:7px}
.kt{display:inline-block;font-size:9px;padding:2px 7px;border-radius:6px;margin-bottom:4px;font-weight:600}
.kt.concept{background:rgba(77,166,255,.15);color:var(--accent)}.kt.rule{background:rgba(52,211,153,.15);color:var(--green)}.kt.formula{background:rgba(240,192,64,.15);color:var(--gold)}
.kn{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:3px}.kc p{font-size:11px;color:var(--dim);line-height:1.6}
.qt{background:rgba(240,192,64,.04);border-left:3px solid var(--gold);padding:7px 10px;border-radius:0 7px 7px 0;margin-bottom:5px;font-style:italic;font-size:11px;color:#d0c090}
.pi{font-size:10px;color:var(--dim);padding:2px 0 2px 12px;position:relative}.pi::before{content:"▸";position:absolute;left:0;color:var(--accent)}

/* graph */
.gc{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.gl{display:flex;flex-wrap:wrap;gap:6px;padding:10px;border-bottom:1px solid var(--border);justify-content:center}
.li{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--dim)}.ld{width:8px;height:8px;border-radius:50%}
.ge{display:flex;gap:4px;padding:8px;border-bottom:1px solid var(--border);justify-content:center;flex-wrap:wrap}
.ge .el{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600}
.el.similar{background:rgba(52,211,153,.12);color:var(--green)}
.el.complement{background:rgba(77,166,255,.12);color:var(--accent)}
.el.extends{background:rgba(240,192,64,.12);color:var(--gold)}
.el.contrast{background:rgba(251,113,133,.12);color:var(--red)}
.el.foundation{background:rgba(167,139,250,.12);color:var(--purple)}

/* progress */
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:6px}
.pw{height:6px;background:#1e2a4a;border-radius:3px;overflow:hidden;flex:1;min-width:100px}
.pwf{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:.3s}
.pp{font-size:16px;font-weight:800;color:var(--gold)}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:4px}
.pr{display:flex;align-items:center;gap:6px;padding:8px 11px;background:var(--card);border:1px solid var(--border);border-radius:9px;cursor:pointer;transition:.1s;font-size:11px}
.pr:hover{border-color:var(--accent)}
.pr .pbar{flex:1;height:2px;background:#1e2a4a;border-radius:1px;overflow:hidden}.pr .pbf{height:100%;background:var(--green);border-radius:1px}
.pr .pps{font-size:9px;color:var(--muted);width:24px;text-align:right}
.rst{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;cursor:pointer;margin-top:8px}
.rst:hover{border-color:var(--red);color:var(--red)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);padding:8px 18px;border-radius:18px;font-size:11px;color:var(--text);z-index:200;animation:ti .3s;pointer-events:none}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@media(max-width:600px){.hd h1{font-size:21px}.tb{padding:9px 3px;font-size:10px}.tb .ti{font-size:15px}.lg{grid-template-columns:1fr}.pg{grid-template-columns:1fr}}
</style></head>

<script type="application/json" id="dt">
{"books": [{"id": "b06", "title": "股票大作手回忆录", "author": "Edwin Lefèvre", "category": "交易心理", "stage": 1, "diff": 1, "hours": 10, "summary": "华尔街传奇交易员利弗莫尔的传记体小说。从5美元起家到做空1929年大崩盘赚取1亿美元。深刻揭示市场运行规律和人性弱点。", "chapters": [{"title": "第1章·少年赌客：报价板上的智慧", "level": "必修", "points": [{"t": "最小阻力方向", "c": "价格朝阻力最小的方向运行——利弗莫尔14岁发现的核心规律。观察方向而非预测方向。", "detail": "在投机行用报价带记录价格时发现：当上涨比下跌容易时持续上涨。不预测市场应该怎么走——观察市场正在怎么走。", "highlights": [{"text": "核心：价格沿最小阻力方向运动", "color": "gold"}, {"text": "规则：观察方向不预测方向", "color": "green"}]}]}, {"title": "第2章·华尔街初体验：止损觉醒", "level": "必修", "points": [{"t": "报价延迟的致命性", "c": "同一个利弗莫尔——投机行无敌→真实市场亏光。环境变了优势消失。", "detail": "成功可能是因为你处于有利环境中。改变环境结果完全不同。", "highlights": [{"text": "警示：同样方法不同环境结果天差地别", "color": "red"}]}, {"t": "止损意识觉醒", "c": "让你破产的不是判断错误，而是不认错。止损=保护交易资格。", "detail": "每次大亏共同点：明知方向反了但不认错不断加仓摊平直到亏光。", "highlights": [{"text": "核心：止损=保护继续交易的资格", "color": "gold"}]}]}, {"title": "第3章·关键点理论：等待的艺术", "level": "必修", "points": [{"t": "什么是关键点", "c": "价格突破关键价位后趋势真正确认。在关键点入场=止损最窄+盈亏比最大。", "detail": "关键点=多空力量质变位置。识别：前高前低、整数关口、均线位、密集成交区。", "highlights": [{"text": "核心：关键点=多空力量质变位置", "color": "gold"}]}, {"t": "坐功比选股重要", "c": "我赚大钱的秘诀从来不是我的想法，而是我的坐功。持仓时间决定利润大小。", "detail": "入场→设止损→什么都不做→等趋势走完。频繁交易是最大利润杀手。", "highlights": [{"text": "核心：持仓时间决定利润", "color": "gold"}]}]}, {"title": "第4章·金字塔加仓", "level": "推荐", "points": [{"t": "试探→确认→加仓", "c": "小仓位试探→市场证实正确→逐步加仓。每笔加仓在盈利状态下进行。亏损仓位绝不补充。", "detail": "流程：1/5仓位入场→价格证实→加仓→再证实再加。补仓=赌徒行为。", "highlights": [{"text": "规则：只在盈利仓位加仓", "color": "green"}]}]}, {"title": "第5章·1929年世纪做空", "level": "推荐", "points": [{"t": "如何预见崩盘", "c": "领先股不再创新高+市场广度恶化+成交量萎缩=道氏理论经典顶部信号。", "detail": "不是预测崩盘日期——是判断市场结构恶化到不可持续。", "highlights": [{"text": "核心：预判=观察市场结构而非预测日期", "color": "gold"}]}]}, {"title": "第6章·利弗莫尔的坠落", "level": "必修", "points": [{"t": "人性终极考验", "c": "一生多次赚到数亿又亏光——违反了自己的交易规则。知道≠做到。", "detail": "最大讽刺：亲手写的规则帮他赚数亿，也是他反复违反的见证。", "highlights": [{"text": "核心：知道≠做到——执行力决定一切", "color": "gold"}, {"text": "警示：利弗莫尔失败比成功更有教育意义", "color": "red"}]}]}], "knowledge_cards": [{"t": "最小阻力线法则", "c": "价格沿最小阻力方向运动。判断：突破阻力轻松=向上，跌破支撑轻松=向下。回调低点不断抬高=向上趋势。", "type": "concept"}, {"t": "关键点交易法", "c": "识别：前高前低+整数关口+长期均线+密集成交区。入场=关键点突破。止损=另一侧2-3%。放量=确认。", "type": "rule"}], "quotes": ["华尔街没有新鲜事，因为投机像群山一样古老。", "让你破产的不是判断错误，而是不认错。"], "practice": ["识别市场大趋势", "耐心等待关键点"]}, {"id": "b17", "title": "炒股的智慧", "author": "陈江挺", "category": "实战", "stage": 1, "diff": 1, "hours": 8, "summary": "华人在华尔街从散户做到专业交易员的传奇。用中文写出最接地气的交易入门书——没有复杂公式，只有血的教训。", "chapters": [{"title": "第1章·认清身份", "level": "必修", "points": [{"t": "投资者vs投机者", "c": "两者思维方式完全不同。用投机心态做投资+用投资心态做投机=必亏。先明确身份再执行。", "detail": "大跌时安慰自己长期投资不用止损——但当初明明是追涨投机。身份混乱=决策混乱=亏损。", "highlights": [{"text": "核心：明确定位——投资和投机完全不同", "color": "gold"}]}]}, {"title": "第2章·止损是铁律", "level": "必修", "points": [{"t": "止损数学原理", "c": "亏10%需涨11%回本，亏50%需涨100%，亏90%需涨900%。深度亏损=亏钱+亏时间双重损失。", "detail": "公式：回本=1/(1-亏损率)-1。指数关系。100跌50需涨100%回——平均需3-5年。", "highlights": [{"text": "公式：回本=1/(1-亏损率)-1", "color": "gold"}, {"text": "警示：深度亏损=亏钱+亏时间", "color": "red"}]}, {"t": "四种止损方法", "c": "固定比例+技术止损+时间止损+资金止损。资金止损是底线——到了就砍不问理由。", "detail": "固定比例最简单有效。时间止损常被忽视：买入理由'短期涨'但2周不涨=时机不对。", "highlights": [{"text": "规则：资金止损是底线", "color": "green"}]}]}, {"title": "第3章·等待的艺术", "level": "必修", "points": [{"t": "空仓=最高境界", "c": "不会空仓的人永远不会炒股。至少50%时间保持空仓或轻仓。", "detail": "空仓=旁观者清醒。持仓=参与者判断力打对折。不是放弃机会是等待最好机会。", "highlights": [{"text": "核心：空仓=区分专业和业余的关键", "color": "gold"}]}, {"t": "四个出手条件", "c": "趋势明确+安全边际+盈亏比≥3:1+明确止损位。缺一不可。一年3-5次足矣。", "detail": "全年做50次其中40次不符合=亏。筛选严格才能保证质量。", "highlights": [{"text": "规则：四条件全满足才出手", "color": "green"}]}]}, {"title": "第4章·顺势而为", "level": "推荐", "points": [{"t": "不同市况不同策略", "c": "牛市持股不动+熊市空仓+震荡市波段。永远不一招鲜吃遍天。", "detail": "牛市高抛低吸=错过大趋势。熊市抄底=接飞刀。关键是根据环境切换策略。", "highlights": [{"text": "规则：牛市持有→熊市空仓→震荡波段", "color": "green"}]}, {"t": "仓位决定心态", "c": "单笔≤总资产4-6%。轻仓才能理性判断。满仓=丧失判断力。", "detail": "没有后顾之忧的交易最理性。总资产20-30%入市×单笔20%=单笔4-6%风险。", "highlights": [{"text": "规则：单笔≤总资产4-6%", "color": "green"}]}]}], "knowledge_cards": [{"t": "止损数学", "c": "亏损5%需5.3%回本,10%需11%,20%需25%,50%需100%,90%需900%。公式:回本=1/(1-亏损率)-1。", "type": "formula"}, {"t": "空仓的力量", "c": "无明确判断时最好操作=不操作。至少50%时间空仓或轻仓。空仓=清醒,持仓=判断打折。", "type": "rule"}], "quotes": ["炒股其实就是炒自己。", "在股市里，慢就是快。"], "practice": ["止损设定实操", "空仓等待的心态训练"]}, {"id": "b07", "title": "交易心理分析", "author": "Mark Douglas", "category": "交易心理", "stage": 1, "diff": 3, "hours": 12, "summary": "概率思维重新定义交易本质。5个基本事实+7个持续一致思维原则——交易心理里程碑著作。", "chapters": [{"title": "第1章·5个基本事实", "level": "必修", "points": [{"t": "任何事都可能发生", "c": "市场不需要合乎逻辑。接受不确定性是交易第一课。", "detail": "从预测思维转变为概率思维。不追求每笔赚钱——追求执行系统。", "highlights": [{"text": "核心：接受不确定性——不预测市场", "color": "gold"}]}, {"t": "每笔结果随机+概率优势", "c": "任何一笔交易结果随机。长期获利靠概率优势+足够多次数。关注统计而非单笔。", "detail": "盯着单笔结果=痛苦。盯着长期统计=自由。交易不是预测游戏——是概率游戏。", "highlights": [{"text": "核心：交易=概率游戏，不是预测游戏", "color": "gold"}]}]}, {"title": "第2章·五大情绪陷阱", "level": "必修", "points": [{"t": "贪婪+恐惧+希望+愤怒+过度自信", "c": "五大情绪陷阱永远存在只能管理不能消除。每天开盘前检查自己在哪个陷阱中。", "detail": "在恐惧中→今天减半仓位。在贪婪中→今天不加仓。在过度自信中→严格执行止损。", "highlights": [{"text": "警示：五大情绪陷阱永远存在", "color": "red"}, {"text": "规则：每天检查情绪——在陷阱中调整策略", "color": "green"}]}]}, {"title": "第3章·概率思维训练", "level": "推荐", "points": [{"t": "盈亏中性训练", "c": "不因盈利兴奋，不因亏损沮丧。每笔交易只是一个数据点。关注统计结果。", "detail": "连续亏损3次不代表系统失效——可能只是正常的概率分布。连续盈利3次不代表你厉害——可能只是运气好。", "highlights": [{"text": "核心：盈亏中性——关注统计不关注单笔", "color": "gold"}]}]}], "knowledge_cards": [{"t": "每日开盘仪式", "c": "开盘前默念5个事实：①任何事都可能发生②不需要预测也能赚钱③每笔随机④概率优势+多次=盈利⑤每个当下独特。坚持21天重塑交易信念。", "type": "rule"}, {"t": "自我破坏行为识别", "c": "止损后反向重仓、盈利后加大仓位、连续亏损想翻盘、看到别人赚钱追入、亏损后不敢入场——每天收盘对照检查。", "type": "rule"}], "quotes": ["任何一笔交易的结果都是随机的，长期获利靠的是概率优势。"], "practice": ["交易前情绪检查表", "盈亏中性化训练"]}, {"id": "b35", "title": "随机漫步的傻瓜", "author": "Nassim Taleb", "category": "交易心理", "stage": 1, "diff": 2, "hours": 10, "summary": "塔勒布处女作。揭示我们如何被随机性愚弄——把运气当能力、把噪音当信号。读完后对所有投资大师产生深刻怀疑。", "chapters": [{"title": "第1章·幸存者偏差", "level": "必修", "points": [{"t": "猴子的故事", "c": "1000只猴子投硬币总有一只连续10次正面——那只猴子认为自己有特殊能力。这就是很多投资大师的真相。", "detail": "你只看到成功的幸存者，看不到失败的99%。某基金连续5年跑赢可能纯粹靠运气——初始1000只可能950只已消失。", "highlights": [{"text": "核心：你只看到幸存者——看不到失败者", "color": "gold"}]}]}, {"title": "第2章·噪音vs信号", "level": "必修", "points": [{"t": "区分方法", "c": "有因果逻辑+持续时间长+可重复=信号。无因果+时间短+不可重复=噪音。", "detail": "问自己：①为什么存在这个规律？②持续了多久？③反过来做会怎样？三个都答不上=噪音。", "highlights": [{"text": "规则：信号=因果+时间+可重复", "color": "green"}]}]}, {"title": "第3章·被随机性愚弄", "level": "推荐", "points": [{"t": "生活中的随机性", "c": "把运气当能力是人类最普遍的认知偏差。成功时归因于自己，失败时归因于运气——但往往相反。", "detail": "塔勒布建议：对任何声称能预测市场的人保持根本性怀疑。没有人能持续预测——如果有，他已经是世界首富了。", "highlights": [{"text": "思考：你崇拜的大师是实力还是运气？", "color": "purple"}]}]}], "knowledge_cards": [{"t": "噪音过滤三步法", "c": "①有因果逻辑吗？(无=噪音)②持续了多久？(<1年=可能随机)③反过来做会怎样？(反过来也说得通=事后诸葛亮)。每天练习识别一个错觉。", "type": "rule"}], "quotes": ["我们更容易被随机性愚弄，而不是被复杂性愚弄。"], "practice": ["识别幸存者偏差", "噪音过滤训练"]}, {"id": "b09", "title": "道氏理论", "author": "Robert Rhea", "category": "市场理论", "stage": 2, "diff": 2, "hours": 10, "summary": "所有技术分析的理论基石。Charles Dow提出趋势三级别和三发展阶段。", "chapters": [{"title": "第1章·三大假设", "level": "必修", "points": [{"t": "包容一切+三趋势", "c": "股价反映一切信息。三趋势：主要(年+)>次级(月)>小(周)。明确交易级别避免混乱。", "detail": "日线交易不理会小时线——那是噪音。周线投资不理会日线——那是正常调整。", "highlights": [{"text": "核心：价格反映一切", "color": "gold"}, {"text": "警示：级别混乱=判断与执行矛盾", "color": "red"}]}]}, {"title": "第2章·趋势三阶段", "level": "必修", "points": [{"t": "吸筹→参与→派发", "c": "聪明钱建仓→趋势确认散户追涨→聪明钱出货。阶段识别信号。", "detail": "底部放量不涨=吸筹。量价齐升=参与。新高缩量=派发。", "highlights": [{"text": "核心：三阶段=吸筹→参与→派发", "color": "gold"}]}]}, {"title": "第3章·指数验证与量价", "level": "推荐", "points": [{"t": "指数互相验证", "c": "大盘+行业+个股同步创新高=最强。三重背离=危险信号。", "detail": "任一级背离=谨慎。背离是市场结构恶化的早期信号。", "highlights": [{"text": "规则：三重验证=大盘+行业+个股同步", "color": "green"}]}, {"t": "量价关系", "c": "量在价先——成交量领先价格1-3天。价涨量增=健康。价涨量缩=动能衰减。", "detail": "天量常=顶。地量常=底。没有量配合的上涨=无人接力。", "highlights": [{"text": "规则：量在价先1-3天", "color": "green"}]}]}], "knowledge_cards": [{"t": "道氏三趋势量化", "c": "主要：价在200日线上+200日向上。次级：回50日但200日不变。小：3-5天随机波动。统一级别。", "type": "rule"}, {"t": "量价四组合", "c": "价涨量增=持股。价涨量缩=顶背离减仓。价跌量缩=正常。价跌量增=恐慌止损。", "type": "rule"}], "quotes": ["平均指数包容和消化一切。"], "practice": ["识别主要趋势", "成交量判断"]}, {"id": "b01", "title": "日本蜡烛图技术", "author": "Steve Nison", "category": "K线技术", "stage": 2, "diff": 2, "hours": 14, "summary": "K线分析奠基之作。系统讲解50多种蜡烛图形态的识别方法和市场含义。", "chapters": [{"title": "第1章·K线构成与读法", "level": "必修", "points": [{"t": "一根K线的故事", "c": "阳=收盘>开盘(买方胜)。阴=收盘<开盘(卖方胜)。实体=力道。影线=曾到达后被推回。", "detail": "每根K线=完整微型故事：开盘=多空起始位。最高=多头最远。最低=空头最远。收盘=最终胜负。", "highlights": [{"text": "核心：每根K线=完整多空博弈故事", "color": "gold"}]}]}, {"title": "第2章·单K线反转信号", "level": "必修", "points": [{"t": "锤子线与上吊线", "c": "实体小+下影极长+上影极短。跌末=锤子(看涨)。涨末=上吊(看跌)。次日K线验证必需。", "detail": "锤子逻辑：空头打下去后多头强力拉回收盘在开盘附近→底部可能。上吊反之。必须等次日确认。", "highlights": [{"text": "规则：次日K线验证必不可少", "color": "green"}]}, {"t": "十字星", "c": "开盘=收盘多空均衡。趋势末端=反转信号。长腿十字星+大成交量=最强信号。", "detail": "十字星越长腿说明多空争夺越激烈，反转力越大。配合成交量放大=重要反转点。", "highlights": [{"text": "核心：十字星+趋势末端=反转信号", "color": "gold"}]}]}, {"title": "第3章·双K与三K反转", "level": "必修", "points": [{"t": "吞没形态", "c": "第二根实体完全吞没第一根。看涨吞没=阴线后更大阳线。吞没力度越大信号越强。", "detail": "强吞没：吞没线实体≥被吞没线1.5倍+在支撑位+放量。胜率>65%。", "highlights": [{"text": "核心：吞没=多空力量质变", "color": "gold"}]}, {"t": "启明星与黄昏星", "c": "大阴→跳空小K→大阳(收复50%+)=启明星(看涨)。大阳→跳空小K→大阴(跌入50%+)=黄昏星(看跌)。", "detail": "三根K线讲述：空头强→多空僵持→多头反攻的完整故事。第三天必需深入第一天50%+。", "highlights": [{"text": "规则：第三天深入第一天50%+信号才有效", "color": "green"}]}]}, {"title": "第4章·多指标共振", "level": "推荐", "points": [{"t": "K线+指标共振", "c": "单K线胜率约55%→K线+RSI共振约70%→K线+RSI+均线共振约80%。共振越多仓位越大。", "detail": "最强共振组合：K线反转+RSI超买超卖+布林带触及上下轨+均线支撑阻力。", "highlights": [{"text": "规则：共振越多信号越强仓位越大", "color": "green"}]}]}], "knowledge_cards": [{"t": "锤子线三要素", "c": "①跌势末端②下影≥实体2倍③上影极短④有成交量⑤次日阳线确认。五条件全满足反转概率>70%。", "type": "rule"}, {"t": "吞没形态强弱", "c": "强(胜率>65%)：1.5倍实体+支撑位+放量+覆盖前几根。弱(<40%)：盘整中+实体差距不大+无量。", "type": "rule"}], "quotes": ["蜡烛图比任何图表形式都能更快揭示市场心理变化。", "一根K线讲述的是完整的多空博弈故事。"], "practice": ["结合成交量验证", "多时间框架确认"]}, {"id": "b02", "title": "日本蜡烛图技术新解", "author": "Steve Nison", "category": "K线技术", "stage": 2, "diff": 3, "hours": 12, "summary": "进阶版。深入三山/三川、反击线等高级反转信号，增加蜡烛图与西方技术指标结合。", "chapters": [{"title": "第1章·三山/三川形态", "level": "必修", "points": [{"t": "三山(头肩顶)", "c": "三次冲击同一阻力失败。中间略高=头。跌破颈线确认顶部。", "detail": "多头三次进攻均失败。颈线=所有回调支撑，跌破=所有买入者被套→加速下跌。", "highlights": [{"text": "核心：三山=多头三次进攻失败", "color": "gold"}]}, {"t": "颈线测量法", "c": "头部到颈线距离=跌破颈线后最小目标距离。如头100颈线90→目标=80。", "detail": "最常用的形态目标测量方法。不是精确价位是最小目标。", "highlights": [{"text": "公式：最小目标=颈线-(头-颈线)", "color": "gold"}]}]}, {"title": "第2章·反击线与平头", "level": "推荐", "points": [{"t": "反击线", "c": "跳空后被反向推回收盘于前日收盘附近。多头/空头反击成功。", "detail": "比刺透更强——跳空幅度更大反映更极端情绪反转。", "highlights": [{"text": "核心：反击=跳空后反向推回=动能瞬间衰竭", "color": "gold"}]}, {"t": "平头形态", "c": "多次冲击同一价位失败形成平头。平头顶+看跌吞没=强烈卖出。平头底+锤子=强烈买入。", "detail": "两个信号叠加胜率提升20-30%。", "highlights": [{"text": "规则：平头+其他信号共振=胜率大幅提升", "color": "green"}]}]}], "knowledge_cards": [{"t": "三山颈线测量", "c": "头部最高点到颈线垂直距离=突破后最小跌幅目标。不是精确价位——是最小目标。", "type": "formula"}], "quotes": ["最好的交易信号来自多种工具的共振。"], "practice": ["多指标共振策略"]}, {"id": "b03", "title": "股市趋势技术分析", "author": "Edwards/Magee", "category": "技术分析", "stage": 2, "diff": 3, "hours": 20, "summary": "技术分析圣经。系统阐述趋势理论、支撑阻力、头肩、双重顶底、三角形等经典形态。", "chapters": [{"title": "第1章·趋势与支撑阻力", "level": "必修", "points": [{"t": "趋势本质", "c": "上升=高点更高+低点更高。下降=高点更低+低点更低。结构不破坏趋势延续。", "detail": "健康上升趋势每次回调低点比上次高。一旦低点不再抬高→趋势可能转向第一个信号。", "highlights": [{"text": "核心：趋势=高点和低点的结构", "color": "gold"}]}, {"t": "支撑阻力互换", "c": "被突破的支撑变阻力，被突破的阻力变支撑。在此价位交易过的人会在回踩时行动。", "detail": "这是技术分析最重要的形态原则——角色互换是判断突破可靠性的基础。", "highlights": [{"text": "核心：支撑和阻力会互换——最重要的形态原则", "color": "gold"}]}]}, {"title": "第2章·头肩形态", "level": "必修", "points": [{"t": "头肩顶结构", "c": "左肩→头部(最高)→右肩→跌破颈线=确认。右肩量<左肩<头部。跌破必须放量。", "detail": "颈线突破+缩量=假突破概率>50%。突破+放量>20日均量1.5倍=真突破概率>80%。", "highlights": [{"text": "规则：颈线突破必须放量确认", "color": "green"}]}, {"t": "测量目标", "c": "头部到颈线距离=跌破后最小目标。反抽颈线+缩量=正常确认。", "detail": "头肩形态是技术分析中最可靠形态之一——但必须等待确认信号。", "highlights": [{"text": "公式：目标=颈线-(头-颈线)", "color": "gold"}]}]}, {"title": "第3章·三角形与旗形", "level": "推荐", "points": [{"t": "对称三角形", "c": "高点越来越低+低点越来越高→收敛后突破。方向不确定——突破方向决定后续趋势。", "detail": "上升三角形(水平阻力+上升支撑)大概率向上突破。下降三角形反之。", "highlights": [{"text": "核心：三角形收敛后必然突破但方向不确定", "color": "gold"}]}, {"t": "旗形上涨中继", "c": "快速运动后小幅反向整理→原趋势恢复。旗杆长度可测量后续目标。最可靠持续形态。", "detail": "持续时间短(1-3周)整理幅度小。旗形是趋势中最可靠的中继形态。", "highlights": [{"text": "规则：旗形=趋势中最可靠中继形态", "color": "green"}]}]}], "knowledge_cards": [{"t": "头肩顶精确测量", "c": "头到颈线距离=最小下跌目标。真突破放量>20日均量1.5倍。假突破缩量概率>50%。", "type": "formula"}], "quotes": ["趋势是你的朋友，直到它结束为止。"], "practice": ["形态目标位测算"]}, {"id": "b30", "title": "期货市场技术分析", "author": "John Murphy", "category": "技术分析", "stage": 2, "diff": 3, "hours": 18, "summary": "技术分析百科全书级教材。CFA考试指定参考书。覆盖均线、震荡指标、OBV、持仓量、市场间分析。", "chapters": [{"title": "第1章·移动平均线系统", "level": "必修", "points": [{"t": "均线实战核心", "c": "单均线=价格在线上多头。双均线=金叉买入。三均线=多头排列最强。均线方向>位置。", "detail": "均线向上时价破均线可能是买点(回调买入)。均线向下时价破均线可能是卖点(反弹卖出)。", "highlights": [{"text": "核心：均线方向比位置更重要", "color": "gold"}]}]}, {"title": "第2章·MACD与RSI", "level": "必修", "points": [{"t": "MACD背离最强", "c": "价创新高DIF不创新高=顶背离卖出。价创新低DIF不创新低=底背离买入。周线>日线。", "detail": "零轴附近背离信号更强。两次背离>一次。背离+趋势线突破=最强组合。", "highlights": [{"text": "核心：MACD背离=最可靠反转信号", "color": "gold"}]}]}, {"title": "第3章·成交量与市场间分析", "level": "推荐", "points": [{"t": "OBV能量潮", "c": "OBV与价同步=健康。OBV不跟=背离。OBV的走势比数值更重要。", "detail": "OBV的背离是最可靠量价信号之一。量在价先。", "highlights": [{"text": "规则：OBV背离=最可靠量价信号", "color": "green"}]}, {"t": "跨市场联动", "c": "美元↑→商品↓。债券收益率↑→股票承压。黄金↑→通胀预期↑。", "detail": "单一市场看不够——跨市场联动提供全局视角。", "highlights": [{"text": "核心：跨市场联动=全局视角", "color": "gold"}]}]}], "knowledge_cards": [{"t": "MACD背离用法", "c": "条件：至少两个峰/谷确认+DIF零轴附近更强+周线>日线+背离+趋势线突破=最强。胜率>75%。", "type": "rule"}, {"t": "均线多空定义", "c": "多头排列(MA5>MA10>MA20>MA60)=强势多头回踩MA20买点。空头排列反之。均线粘合=变盘在即。", "type": "rule"}], "quotes": ["技术分析的本质是通过历史价格研究群体心理。"], "practice": ["多指标综合框架", "跨市场联动"]}, {"id": "b04", "title": "技术分析大全", "author": "Martin Pring", "category": "技术分析", "stage": 3, "diff": 3, "hours": 18, "summary": "Pring六维分析框架——趋势、动量、成交量、市场广度、情绪、周期。著名KST指标。", "chapters": [{"title": "第1章·六维框架", "level": "必修", "points": [{"t": "六个维度", "c": "趋势+动量+成交量+市场广度+情绪+周期。≥4维同向=高胜率入场。", "detail": "单一指标有盲点。趋势指标盘整失效，动量指标趋势过早离场，成交量可被操纵。六维共振=最高置信度。", "highlights": [{"text": "核心：六维共振=最高置信度", "color": "gold"}]}]}, {"title": "第2章·多时间框架", "level": "必修", "points": [{"t": "三周期原则", "c": "长期(月线)定战略→中期(周线)定战术→短期(日线)定入场。最短周期服从最长周期。", "detail": "长多+中空=等中期修正后做多。长空+中多=反弹减仓不追涨。", "highlights": [{"text": "规则：最短周期服从最长周期", "color": "green"}]}]}, {"title": "第3章·市场广度", "level": "推荐", "points": [{"t": "腾落线与新高新低比", "c": "AD线与指数同步=健康。指数新高AD线没新高=顶背离。新高低比>2=强势<0.5=弱势。", "detail": "市场广度告诉你上涨是少数大盘股拉动的还是普涨——前者危险后者健康。", "highlights": [{"text": "核心：市场广度=判断上涨质量", "color": "gold"}]}]}], "knowledge_cards": [{"t": "六维共振检查清单", "c": "①价格趋势②KST动量③成交量④市场广度⑤VIX情绪⑥周期位置。≥4满足=入场。", "type": "rule"}], "quotes": ["技术分析是一门艺术，而非精确的科学。"], "practice": ["多周期共振判断"]}, {"id": "b05", "title": "以交易为生", "author": "Alexander Elder", "category": "交易心理", "stage": 3, "diff": 2, "hours": 12, "summary": "Elder博士将心理学与技术分析完美结合。三重滤网交易系统+2%和6%法则。", "chapters": [{"title": "第1章·交易心理学", "level": "必修", "points": [{"t": "交易者最大敌人", "c": "不是市场不是庄家——是你自己。贪婪追高+恐惧杀跌+希望不止损=三重亏损引擎。", "detail": "Elder作为精神科医生提出：每个交易者内心有疯狂赌徒。识别他才能控制他。", "highlights": [{"text": "核心：最大敌人是自己内心的赌徒", "color": "gold"}]}]}, {"title": "第2章·三重滤网系统", "level": "必修", "points": [{"t": "三重滤网流程", "c": "第一重(周线MACD)定方向→第二重(日线RSI)找回调→第三重(小时线)精确入场。", "detail": "逆周线方向的交易绝对不做。三重滤网=从大到小逐步精确——像狙击手瞄准。", "highlights": [{"text": "规则：周线定方向→日线找回调→小时线入场", "color": "green"}]}]}, {"title": "第3章·2%和6%法则", "level": "必修", "points": [{"t": "资金管理铁律", "c": "单笔风险≤总资金2%。当月累计亏损达6%=停止交易至下月。2%控制单笔6%控制月度。", "detail": "2%+6%=双重保险。单笔不爆仓+月度不失控。这是业余和专业的分水岭。", "highlights": [{"text": "规则：单笔≤2%+月度≤6%=生存保障", "color": "green"}]}]}], "knowledge_cards": [{"t": "三重滤网完整流程", "c": "Step1周线MACD定方向→Step2日线RSI<30(做多)或>70(做空)找回调→Step3小时线突破入场。", "type": "rule"}, {"t": "2%和6%法则", "c": "单笔≤2%控制单笔爆仓风险。月度累计亏6%=停交易控制连续亏损失控风险。", "type": "rule"}], "quotes": ["交易的目标不是赚钱，而是做正确的交易。"], "practice": ["三重滤网实操"]}, {"id": "b08", "title": "海龟交易法则", "author": "Curtis Faith", "category": "交易系统", "stage": 3, "diff": 1, "hours": 8, "summary": "传奇交易员Dennis招募23个普通人两周培训——创造超1亿美元利润。证明交易成功靠严格执行系统。", "chapters": [{"title": "第1章·海龟实验", "level": "必修", "points": [{"t": "交易可培养", "c": "23个零经验普通人→两周培训→每人100万美元→4年平均年化>80%。系统+纪律>天赋。", "detail": "选出的是优秀规则执行者非天才交易员。好系统+普通执行者=稳定盈利。", "highlights": [{"text": "核心：系统+纪律>天赋", "color": "gold"}]}]}, {"title": "第2章·唐奇安通道突破", "level": "必修", "points": [{"t": "突破入场", "c": "价破20天最高做多。极简但有效。不追胜率追盈亏比——真趋势利润覆盖假突破亏损。", "detail": "大多突破假突破——但盈亏比>3:1覆盖。你不需要判断真假——你需要接受假突破。", "highlights": [{"text": "核心：不追胜率追盈亏比", "color": "gold"}]}]}, {"title": "第3章·ATR仓位管理", "level": "必修", "points": [{"t": "N值/ATR", "c": "20天平均真实波动。量化噪音→决定止损距离+仓位大小。高波动小仓低波动大仓。", "detail": "仓位=资金×2%÷(2×ATR价值)。ATR统一所有品种风险度量衡——从凭感觉→量化。", "highlights": [{"text": "公式：仓位=(资金×2%)÷(2×ATR×合约乘数)", "color": "gold"}]}]}, {"title": "第4章·纪律>一切", "level": "必修", "points": [{"t": "离开系统=崩溃", "c": "海龟们独立交易后业绩大幅下滑——开始凭感觉修改系统。纪律>聪明。", "detail": "成功不是找到好系统——是严格执行一个系统。坚持执行普通系统10年>不断切换聪明系统。复利喜欢坚持。", "highlights": [{"text": "核心：坚持>聪明——复利喜欢坚持", "color": "gold"}]}]}], "knowledge_cards": [{"t": "ATR仓位计算", "c": "TR=MAX(高-低,高-昨收,昨收-低)。ATR=20日TR均值。仓位=资金×2%÷(2×ATR×合约乘数)。", "type": "formula"}, {"t": "趋势跟踪逻辑", "c": "不预测只跟随。假设：趋势会持续(少数大赚)+大多假突破(多次小亏)+大趋势覆盖小亏。盈亏比>3:1。", "type": "concept"}], "quotes": ["好的交易是无聊的。"], "practice": ["唐奇安通道系统"]}, {"id": "b28", "title": "专业投机原理", "author": "Victor Sperandeo", "category": "交易系统", "stage": 3, "diff": 3, "hours": 14, "summary": "Sperandeo连续12年盈利无一亏损月。123法则+2B法则是最经典的趋势反转判断工具。", "chapters": [{"title": "第1章·123法则", "level": "必修", "points": [{"t": "三步判断反转", "c": "①趋势线被突破②不再创新高低③突破前一个回调低/高点。三步全满足=反转概率>80%。", "detail": "不预测反——等反转自己走出来再确认。第一步警告二步怀疑三步确认。很多人错在第一步就急做反向。", "highlights": [{"text": "核心：等反转走出来再确认不预判", "color": "gold"}]}]}, {"title": "第2章·2B法则", "level": "必修", "points": [{"t": "假突破反转", "c": "价短暂突破前高/低后迅速反转=主力陷阱。诱多出货或诱空吸筹——反向交易。", "detail": "123+2B同时出现=最强反转信号可重仓。仅2B=半仓试单。仅趋势线突破=观望。", "highlights": [{"text": "核心：2B=主力陷阱→反向交易", "color": "gold"}]}]}, {"title": "第3章·趋势线与盈亏比", "level": "推荐", "points": [{"t": "趋势线画法", "c": "连接两个连续回调低/高点。触及越多越有效。角度不能超45度。", "detail": "太陡趋势线不可持续。跌破需收盘确认。趋势线角度判断趋势健康度。", "highlights": [{"text": "规则：趋势线角度30-45度=健康", "color": "green"}]}, {"t": "最小3:1盈亏比", "c": "潜在回报至少潜在风险3倍才入场。即使胜率40%盈亏比3:1期望=0.6(正期望)。", "detail": "胜率80%但盈亏比0.5期望=0.2。盈亏比比胜率重要得多。", "highlights": [{"text": "公式：期望=胜率×盈-(1-胜率)×亏", "color": "gold"}]}]}], "knowledge_cards": [{"t": "123+2B决策矩阵", "c": "123+2B同时现=重仓。仅123=正常仓位。仅2B=半仓。仅趋势线突破=观望。信号越多仓位越大。", "type": "rule"}, {"t": "盈亏比期望公式", "c": "期望=(胜率×均盈)÷(败率×均亏)。胜率40%+盈亏比3:1=0.4×3-0.6×1=0.6正期望。", "type": "formula"}], "quotes": ["交易的唯一目的是赚钱，不是证明自己正确。"], "practice": ["123法则实操", "2B法则假突破"]}, {"id": "b20", "title": "华尔街幽灵", "author": "Arthur Simpson", "category": "交易系统", "stage": 3, "diff": 2, "hours": 8, "summary": "匿名交易大师的三条幽灵法则——全关于防守。极简但极深刻，交易防守哲学最高境界。", "chapters": [{"title": "第1章·三大幽灵法则", "level": "必修", "points": [{"t": "法则一：只持有正确仓位", "c": "入场后N根K线内价格未朝你方向运动=平仓。时间也是成本。", "detail": "时间止损比价格止损更难——因为还没到止损位。但正是再等等让小亏变大亏。", "highlights": [{"text": "警示：时间止损最难执行", "color": "red"}]}, {"t": "法则二：正确时加码", "c": "只有仓位被市场证实正确(浮动盈利)后才加仓。亏损仓位永不补充。", "detail": "加仓=奖励正确。补仓=惩罚错误=赌博。两者永远不能混淆。", "highlights": [{"text": "规则：加仓=奖励正确补仓=惩罚错误", "color": "green"}]}, {"t": "法则三：巨量即出场", "c": "异常巨大成交量时无论盈亏立即出场。巨量=聪明钱行动——你是信息劣势方。", "detail": "不猜测巨量含义——先撤再说。判断正确等量正常后重入场。判断错误已保住本金。", "highlights": [{"text": "核心：巨量=聪明钱行动立即撤退", "color": "gold"}]}]}], "knowledge_cards": [{"t": "时间止损规则", "c": "小时图：入场3根K线未有利≥0.3ATR→平仓。5根无方向→平仓。反向8根→平仓。", "type": "rule"}, {"t": "巨量量化", "c": "当前K量>20均量2.5倍=巨量。或>50根最大量。巨量后：平50%→反向>1ATR全平。", "type": "rule"}], "quotes": ["市场不会打败你，只有你自己能打败自己。", "如果你不知道为什么要持有一个仓位，那就平掉它。"], "practice": ["时间止损应用", "巨量识别应对"]}, {"id": "b13", "title": "通向财务自由之路", "author": "Van Tharp", "category": "资金管理", "stage": 3, "diff": 3, "hours": 14, "summary": "Van Tharp提出交易系统六大部分。R乘数概念彻底改变了专业交易者的资金管理方式。", "chapters": [{"title": "第1章·R乘数管理", "level": "必修", "points": [{"t": "R=统一度量衡", "c": "R=单笔愿承担最大亏损。赚2R=利润是风险2倍。系统质量=平均盈亏R乘数。目标>1.5。", "detail": "像会计中的元——R让所有交易可比。无论品种止损大小统一度量。", "highlights": [{"text": "核心：R=交易系统统一度量衡", "color": "gold"}]}, {"t": "凯利公式", "c": "f=(bp-q)/b。胜率50%+盈亏比2:1→f=25%。实战取1/4≈6.25%。", "detail": "全凯利=波动太大=精神崩溃。降低仓位=降低情绪压力=提高执行力。谨慎比激进活更久。", "highlights": [{"text": "公式：凯利f=(bp-q)/b实战取1/4", "color": "gold"}]}]}, {"title": "第2章·系统开发与头寸", "level": "必修", "points": [{"t": "精力分配法则", "c": "入市10%+出场30%+头寸规模60%。大部分花90%时间在入市——完全搞错。", "detail": "头寸决定赚多少——趋势中敢不敢重仓决定最终收益。出场决定盈亏比。入市只是入场券。", "highlights": [{"text": "规则：头寸60%+出场30%+入市10%", "color": "green"}]}]}], "knowledge_cards": [{"t": "凯利公式", "c": "f=(bp-q)/b。胜率50%+盈亏比2:1→25%。实战取1/4≈6.25%降低波动。", "type": "formula"}, {"t": "R乘数日志", "c": "每笔记录：入场|止损|1R价值|出场|盈亏R。月度统计平均R>1.5达标。", "type": "rule"}], "quotes": ["你用什么方法入市根本不重要，重要的是你的仓位有多大。"], "practice": ["R乘数日志", "头寸规模模型"]}, {"id": "b14", "title": "走进我的交易室", "author": "Alexander Elder", "category": "资金管理", "stage": 4, "diff": 2, "hours": 12, "summary": "Elder将交易系统化为一套完整日常流程：盘前准备→执行→复盘。操作性最强著作。", "chapters": [{"title": "第1章·专业交易者一天", "level": "必修", "points": [{"t": "盘前15分钟仪式", "c": "①隔夜外盘②财经日历③自选股④交易方向⑤最大风险。5步切换大脑模式。", "detail": "仪式感=触发-反应神经回路。21天养成习惯注意力自动集中不用意志力。", "highlights": [{"text": "规则：盘前仪式=切换大脑模式", "color": "green"}]}, {"t": "最佳交易时段", "c": "开盘30分钟只看不交易。黄金=开盘后30分-2小时。尾盘30分波动加大。每天只2-3小时值得交易。", "detail": "不分时间频繁交易=开盘追涨+午盘无聊+尾盘恐慌。知道何时不交易>知道何时交易。", "highlights": [{"text": "规则：每天只2-3小时值得交易", "color": "green"}]}]}, {"title": "第2章·信号评分与复盘", "level": "推荐", "points": [{"t": "信号评分卡", "c": "趋势方向+信号强度+盈亏比+成交量。总分≥7(满分10)才入场。", "detail": "客观评分取代主观感觉。不凭直觉——凭分数。", "highlights": [{"text": "规则：评分≥7才入场", "color": "green"}]}, {"t": "收盘复盘", "c": "遵守规则？信号对错？情绪状态？明天改进？周末深度统计找出盈亏模式。", "detail": "不复盘=不做体检。坚持一月你会发现：70%亏损发生在情绪≥4时。", "highlights": [{"text": "规则：不复盘=不做体检", "color": "green"}]}]}], "knowledge_cards": [{"t": "专业交易者8条习惯", "c": "①固定作息②盘前/后仪式③只用小部分资金④预设止损⑤不做无计划交易⑥日志⑦定期回顾⑧保持健康。", "type": "rule"}], "quotes": ["业余者等着交易来找他，专业者每天按照流程扫描市场。"], "practice": ["交易日流程模板"]}, {"id": "b19", "title": "股票大作手操盘术", "author": "Jesse Livermore", "category": "交易系统", "stage": 4, "diff": 3, "hours": 8, "summary": "利弗莫尔亲手写的交易规则手册。关键点捕捉+金字塔加仓+价格记录法。", "chapters": [{"title": "第1章·关键点战法", "level": "必修", "points": [{"t": "两种关键点", "c": "自然关键点=趋势中回调到关键位企稳。延续关键点=突破盘整区间——最赚钱模式。", "detail": "关键点=多空第二次对决。第一次决定方向第二次决定能否延续。盘整越久突破越猛。", "highlights": [{"text": "核心：关键点=多空第二次对决", "color": "gold"}]}]}, {"title": "第2章·金字塔加仓", "level": "必修", "points": [{"t": "精确加仓规则", "c": "初始1单位→+3点加1→+3点再加→最大5。新止损=倒数第二次加仓价。回调>2/3全平。", "detail": "用精确数字取代感觉。利弗莫尔最失败时=放弃规则凭感觉。最成功时=遵守数字。", "highlights": [{"text": "公式：初始1→+3→+3→最大5", "color": "gold"}]}]}, {"title": "第3章·价格记录法", "level": "推荐", "points": [{"t": "亲手记录感知市场", "c": "利弗莫尔每天手填价格表分上升下降自然回升回撤四栏。通过记录感知趋势转换。", "detail": "不是为了预测——是为了确认：当价格从一栏跳到另一栏说明趋势正在改变。", "highlights": [{"text": "核心：记录=感知趋势转换而非预测", "color": "gold"}]}]}], "knowledge_cards": [{"t": "金字塔加仓精确规则", "c": "初始1→有利+3点加1→+3点再加→最大5。新止损=倒数第二次加仓价。回调>2/3全平。", "type": "formula"}], "quotes": ["投机是一项事业，不是赌博。"], "practice": ["关键点识别", "金字塔加仓计算"]}, {"id": "b29", "title": "股票魔法师", "author": "Mark Minervini", "category": "选股策略", "stage": 4, "diff": 3, "hours": 12, "summary": "Minervini连续三年美国投资大赛冠军3万倍收益。SEPA策略+VCP形态+趋势模板。", "chapters": [{"title": "第1章·SEPA五要素", "level": "必修", "points": [{"t": "趋势→基本面→催化剂→买点→风控", "c": "五个要素全部满足才考虑交易——任一项缺失=放弃。", "detail": "有先后顺序：先看趋势定方向→基本面定质量→催化剂定时机→买点定盈亏比→风控保生存。", "highlights": [{"text": "核心：五要素缺一不可", "color": "gold"}]}]}, {"title": "第2章·VCP波动收缩", "level": "必修", "points": [{"t": "弹簧压缩形态", "c": "至少3次波动收缩+每次比前次小25-50%+最后振幅<10%+底量<均量50%+突破量>均量1.5倍。", "detail": "VCP=弹簧压缩蓄能。收缩越紧爆发越强。收缩点突破=最佳买点——止损窄利润空间大。", "highlights": [{"text": "核心：VCP=弹簧压缩收缩越紧爆发越强", "color": "gold"}]}]}, {"title": "第3章·趋势模板", "level": "推荐", "points": [{"t": "7条筛选标准", "c": "股价>150/200日线+150>200+200日上涨≥1月+>52周低30%+在52周高25%内+RS>70。全满足=入选。", "detail": "趋势模板=过滤器——不符合的任何股票不看。每天收盘30分钟完成自选股检查。", "highlights": [{"text": "规则：趋势模板=硬性过滤器", "color": "green"}]}]}], "knowledge_cards": [{"t": "VCP量化标准", "c": "①≥3次收缩②每次小25-50%③最后振幅<10%④底量<均量50%⑤突破量>均量1.5倍⑥收缩2-6周。", "type": "rule"}, {"t": "趋势模板", "c": "股价>150/200日线→150>200→200日涨≥1月→>52周低30%→在52高25%内→RS>70。全满足。", "type": "rule"}], "quotes": ["坚持你的策略比找到好的策略难100倍。"], "practice": ["VCP形态识别", "趋势模板筛选"]}, {"id": "b12", "title": "笑傲股市", "author": "William O'Neil", "category": "选股策略", "stage": 4, "diff": 2, "hours": 12, "summary": "欧奈尔CAN SLIM选股法+带柄茶杯形态+7-8%止损铁律。研究100只超级牛股总结。", "chapters": [{"title": "第1章·CAN SLIM", "level": "必修", "points": [{"t": "七字母选股法", "c": "C=当季EPS>25%。A=年度EPS>25%。N=新产品。S=供需。L=领导股。I=机构认同。M=市场方向。", "detail": "基本面+资金面+技术面三位一体。七条全满足股票极少但每条过滤大量劣质标的。不妥协。", "highlights": [{"text": "核心：CANSLIM=基本面+资金面+技术面", "color": "gold"}]}]}, {"title": "第2章·带柄茶杯+7%止损", "level": "必修", "points": [{"t": "茶杯形态量化", "c": "上涨30%+→回调12-33%→杯底U型→杯柄窄幅1-2周→突破杯柄高点=买入。突破量>日均1.5倍。", "detail": "杯深12-33%太深=趋势破坏。杯长7-65周。杯柄回撤<10-15%。精确量化让入场从艺术变科学。", "highlights": [{"text": "规则：杯深12-33%+杯长7-65周+突破量1.5倍", "color": "green"}]}, {"t": "7-8%止损铁律", "c": "任何股票亏损达7-8%无条件卖出不管什么理由。这是欧奈尔从所有大亏中总结的唯一保护。", "detail": "盈亏比22%:7%≈3:1。胜率40%下：0.4×22%-0.6×7%=+4.6%正期望。关键在盈亏比非胜率。", "highlights": [{"text": "公式：盈亏比3:1+胜率40%=正期望", "color": "gold"}]}]}], "knowledge_cards": [{"t": "CAN SLIM筛选流程", "c": "Step1:EPS>25%(200只)。Step2:RS>80+机构增持(50只)。Step3:找杯柄/平底(10只)。Step4:突破买点+放量(1-3只)。", "type": "rule"}, {"t": "7-8%止损原理", "c": "盈亏比22%:7%≈3:1。胜率40%下期望=0.4×22%-0.6×7%=+4.6%。关键在盈亏比。", "type": "formula"}], "quotes": ["你买的不是股票，而是一家公司。"], "practice": ["CAN SLIM筛选法", "带柄茶杯识别"]}, {"id": "b31", "title": "金融怪杰", "author": "Jack Schwager", "category": "交易系统", "stage": 4, "diff": 2, "hours": 14, "summary": "Schwager采访17位顶级交易员。他们的方法各不相同但纪律和心态惊人一致。", "chapters": [{"title": "第1章·大师们的共同点", "level": "必修", "points": [{"t": "17位大师共同特质", "c": "都曾亏光过+极度自律+明确系统+严格执行止损+风控放首位+不预测只跟随。", "detail": "方法各不相同(基本面/技术面/宏观)——但执行方式惊人一致。证明：方法不是关键执行力是关键。", "highlights": [{"text": "核心：执行力>方法——17位大师证明", "color": "gold"}]}]}, {"title": "第2章·Paul Tudor Jones", "level": "推荐", "points": [{"t": "1987年黑色星期一", "c": "崩盘前判断市场会跌但当天仍在做多。发现错误立即反手做空——当天赚1亿美元。", "detail": "判断正确≠立即正确。发现错误立即纠正的能力比预测能力更值钱。", "highlights": [{"text": "核心：发现错误立即纠正>预测正确", "color": "gold"}]}]}], "knowledge_cards": [{"t": "17位大师共同止损原则", "c": "①止损≤2%②事先设定③止损后等30分重入场④连续3次=停当天⑤月度亏6%=停当月。不分方法适用所有人。", "type": "rule"}], "quotes": ["市场不在乎你是谁，它永远按照自己的方式运行。"], "practice": ["17位大师策略对比"]}, {"id": "b32", "title": "新金融怪杰", "author": "Jack Schwager", "category": "交易系统", "stage": 4, "diff": 2, "hours": 14, "summary": "采访外汇、期权、系统化交易等细分领域顶尖高手。比前作更多元化技术化。", "chapters": [{"title": "第1章·外汇之王Lipschutz", "level": "推荐", "points": [{"t": "从12000到数亿", "c": "市场永远是对的——但你的交易理由可能也是对的只是时机不对。判断+时机缺一不可。", "detail": "区分判断正确和时机正确。判断一只股会涨是对的但入场先跌30%心态崩溃——在真正涨前止损。", "highlights": [{"text": "核心：判断正确≠时机正确——两者缺一不可", "color": "gold"}]}]}, {"title": "第2章·系统化交易", "level": "推荐", "points": [{"t": "机械+人为最优", "c": "机械系统=无情绪+可回测+可复制处理80%日常。人为=处理20%特殊情况。", "detail": "纯粹机械系统：市场结构性变化导致失效。纯粹主观：情绪干扰严重。最优=系统为主人为监督。", "highlights": [{"text": "规则：系统处理80%常规人为处理20%异常", "color": "green"}]}]}], "knowledge_cards": [{"t": "系统化交易核心原则", "c": "①规则可编程执行②风险预先定义③正期望值④经历牛熊回测⑤实盘最小仓位验证。", "type": "rule"}], "quotes": ["交易系统就像汽车——即使最好的车也需要好司机。"], "practice": ["系统化交易框架"]}, {"id": "b10", "title": "艾略特波浪理论", "author": "Frost/Prechter", "category": "市场理论", "stage": 4, "diff": 4, "hours": 14, "summary": "5-3波浪模式+斐波那契比率。虽然争议大但提供理解市场心理节奏的独特框架。", "chapters": [{"title": "第1章·波浪结构与铁律", "level": "必修", "points": [{"t": "5-3模式", "c": "完整周期=5浪推动+3浪调整=8浪。自相似性——大浪套小浪每个级别遵循5-3。", "detail": "推动浪1/3/5同向2/4回调。调整浪A/C同向B反弹。所有级别同样结构。", "highlights": [{"text": "核心：5-3=推动+调整=完整周期", "color": "gold"}]}, {"t": "三大铁律", "c": "①2浪不超1浪起点②3浪不能最短③4浪不入1浪区域。违反=重数。", "detail": "铁律是底线——违反一定错。不违反不一定对(有多种可能)但违反一定错。", "highlights": [{"text": "规则：铁律不可违反——违反=重数", "color": "green"}]}]}, {"title": "第2章·斐波那契测算", "level": "推荐", "points": [{"t": "回撤与延伸比率", "c": "回撤：2浪=1浪50%或61.8%4浪=3浪38.2%或50%。延伸：3浪=1浪1.618倍5浪=1-3浪0.618倍。", "detail": "斐波那契不是精确价位——是目标区域。接近目标出现其他反转信号(形态+量+背离)=确认。", "highlights": [{"text": "公式：斐波那契=目标区域非精确价位", "color": "gold"}]}]}], "knowledge_cards": [{"t": "推动浪检查清单", "c": "①2超1起点?②3最短?③4入1区?④1/3/5内部5浪?⑤2/4内部3浪?全满足=正确。", "type": "rule"}], "quotes": ["市场是按照自然法则运行的。"], "practice": ["波浪计数规则"]}, {"id": "b11", "title": "威科夫方法", "author": "David Weis", "category": "市场理论", "stage": 5, "diff": 4, "hours": 12, "summary": "通过价量关系判断聪明钱动向。Spring弹簧+UTAD。理解市场微观结构利器。", "chapters": [{"title": "第1章·追踪聪明钱", "level": "必修", "points": [{"t": "吸筹vs派发", "c": "底部放量不跌=吸筹(聪明钱买入)。顶部放量不涨=派发(聪明钱卖出)。量在价先——成交量是聪明钱足迹。", "detail": "聪明钱可把价格做假象但成交量无法隐藏。量告诉你真相。", "highlights": [{"text": "核心：量在价先——量=聪明钱足迹", "color": "gold"}]}]}, {"title": "第2章·Spring与UTAD", "level": "必修", "points": [{"t": "Spring=空头陷阱", "c": "价短暂跌破支撑后迅速拉回=诱空=买入信号。跌时放量+拉回更大量=可靠。", "detail": "主力制造恐慌→吓出散户→大量接盘拉回。假突破+快速反转+放量=操纵→反向交易。", "highlights": [{"text": "核心：Spring=诱空→买入信号", "color": "gold"}]}, {"t": "UTAD=多头陷阱", "c": "价短暂突破阻力后迅速跌回=诱多=卖出信号。假突破+快速反转+放量=操纵。", "detail": "主力制造突破假象→吸引追涨→大量出货跌回。识别后反向交易=最佳卖点。", "highlights": [{"text": "核心：UTAD=诱多→卖出信号", "color": "gold"}]}]}, {"title": "第3章·威科夫事件序列", "level": "推荐", "points": [{"t": "五阶段模型", "c": "A停止下跌→B吸筹区间→C弹簧测试→D上涨突破→E趋势延续。C=最佳买点D=趋势确认入场。", "detail": "识别当前阶段=知道该做什么。", "highlights": [{"text": "核心：识别阶段=知道策略", "color": "gold"}]}]}], "knowledge_cards": [{"t": "Spring量化识别", "c": "①跌破区间低位②<区间5%③1-3根K线拉回④拉回量>跌破量。4全满足=95%操纵。", "type": "rule"}], "quotes": ["价格是结果，成交量是原因。"], "practice": []}, {"id": "b25", "title": "投资最重要的事", "author": "Howard Marks", "category": "投资哲学", "stage": 5, "diff": 3, "hours": 12, "summary": "橡树资本创始人Marks备忘录精华。第二层思维+市场钟摆+逆向投资。", "chapters": [{"title": "第1章·第二层思维", "level": "必修", "points": [{"t": "比别人多想一步", "c": "第一层：好公司买！第二层：好公司但人人都知道估值已反映应该卖！", "detail": "三个检验问题：①大多数人怎么看？②我有什么不同？③为什么我比大多数人正确？答不出③=不行动。", "highlights": [{"text": "核心：第二层=多想一步", "color": "gold"}]}]}, {"title": "第2章·市场钟摆", "level": "必修", "points": [{"t": "钟摆永远在摆", "c": "市场永远在过度乐观和过度悲观间摆动极少停在中点。识别钟摆位置→逆向。", "detail": "极端信号≥3个：过度悲观=全坏消息+无人聊股+地量+破发+估值最低。过度乐观反之。", "highlights": [{"text": "核心：识别钟摆位置→逆向行动", "color": "gold"}]}]}, {"title": "第3章·风险三层理解", "level": "推荐", "points": [{"t": "波动≠风险", "c": "第一层：风险=波动。第二层：风险=永久亏损。第三层：风险=机会。", "detail": "下跌后能涨回来的不是风险。真正的风险=永久性本金损失。所有人恐惧时风险溢价极高=最好机会。", "highlights": [{"text": "核心：真正的风险=永久性损失", "color": "gold"}]}]}], "knowledge_cards": [{"t": "第二层思维训练", "c": "每做投资决定前问三问。一年后成为肌肉记忆。区分业余和专业核心能力。", "type": "rule"}], "quotes": ["你不能预测未来，但你可以为未来做准备。"], "practice": []}, {"id": "b26", "title": "金融炼金术", "author": "George Soros", "category": "投资哲学", "stage": 5, "diff": 5, "hours": 16, "summary": "索罗斯提出反身性理论——参与者偏见影响基本面形成自我强化循环。", "chapters": [{"title": "第1章·反身性理论", "level": "必修", "points": [{"t": "价格↔基本面", "c": "传统经济学：价格=基本面。反身性：价格影响基本面→基本面影响价格→自我强化循环。", "detail": "繁荣期：价格上涨→公司融资更容易基本面改善→再涨→正反馈。崩解点：基本面跟不上→负反馈→暴跌。", "highlights": [{"text": "核心：反身性=价格与基本面互相强化", "color": "gold"}]}]}, {"title": "第2章·泡沫八阶段", "level": "必修", "points": [{"t": "识别进程", "c": "变革→繁荣→亢奋→利润→新范式→动摇→金融危机→大萧条。识别阶段=知道进退。", "detail": "股价脱离基本面=4-5警惕。都说这次不一样=5-6该跑。不预测拐点等确认反转再行动。", "highlights": [{"text": "核心：识别泡沫阶段=知道进退", "color": "gold"}]}]}], "knowledge_cards": [{"t": "泡沫八阶段", "c": "变革→繁荣→亢奋→利润→新范式→动摇→危机→萧条。2-3最肥美5-6该跑。", "type": "concept"}], "quotes": ["我之所以富有，是因为我知道自己什么时候错了。"], "practice": []}, {"id": "b27", "title": "原则", "author": "Ray Dalio", "category": "投资哲学", "stage": 5, "diff": 3, "hours": 14, "summary": "桥水基金创始人Dalio一生总结。全天候策略+经济机器模型+可信度加权。", "chapters": [{"title": "第1章·全天候策略", "level": "必修", "points": [{"t": "配置比例", "c": "30%股票+40%长债+15%中债+7.5%黄金+7.5%大宗。每季度再平衡。永远不崩溃。", "detail": "年化6-8%+波动<10%+回撤<15%。牺牲短期收益换永久生存。任何经济环境都有资产表现好。", "highlights": [{"text": "规则：全天候=永不崩溃", "color": "green"}]}]}, {"title": "第2章·痛苦+反思", "level": "推荐", "points": [{"t": "痛苦+反思=进步", "c": "每次亏损：感受痛苦→写下原因→制定改进规则→执行→循环一次水平上一台阶。", "detail": "不要跳过痛苦——这是成长机会。大多数人跳过继续交易→重复错误→原地打转。", "highlights": [{"text": "核心：痛苦+反思=进步", "color": "gold"}]}]}], "knowledge_cards": [{"t": "全天候配置", "c": "股票30%+长债40%+中债15%+黄金7.5%+大宗7.5%。每季度再平衡。", "type": "formula"}], "quotes": ["痛苦+反思=进步。"], "practice": []}, {"id": "b24", "title": "穷查理宝典", "author": "Charlie Munger", "category": "投资哲学", "stage": 5, "diff": 4, "hours": 14, "summary": "查理·芒格智慧箴言录。多元思维模型+误判心理学+逆向思维。", "chapters": [{"title": "第1章·多元思维模型", "level": "必修", "points": [{"t": "锤子与钉子", "c": "只有一种学科工具=手里只有锤子看什么都是钉子。核心：心理/经济/物理/生物/历史/数学/哲学。", "detail": "做决策前从多学科各问一问——经济学：供需？心理学：情绪？物理学：惯性？生物学：生态位？数学：概率？", "highlights": [{"text": "核心：多元思维=跨学科看问题", "color": "gold"}]}]}, {"title": "第2章·误判心理学", "level": "必修", "points": [{"t": "五大误判", "c": "①不止损②过度自信③从众④厌恶损失⑤确认偏误。每次交易前检查。", "detail": "这些不是弱点——是人类大脑出厂设置。只能管理不能消除。", "highlights": [{"text": "警示：五大误判永远存在只能管理", "color": "red"}]}]}, {"title": "第3章·逆向思维", "level": "必修", "points": [{"t": "反过来想", "c": "解决问题不是想怎么做——是想怎么就会失败然后避免。如果知道我死在哪我永远不去那。", "detail": "在投资中：事先想好什么会让你亏光然后绝不碰。高杠杆→不加。情绪交易→预设止损。追高→等安全边。", "highlights": [{"text": "核心：反过来想——想怎么死然后避免", "color": "gold"}]}]}], "knowledge_cards": [{"t": "误判心理学清单", "c": "影响交易最大5种：①不止损②过度自信③从众④厌恶损失⑤确认偏误。每次交易前检查。", "type": "rule"}], "quotes": ["反过来想，总是反过来想。"], "practice": []}, {"id": "b15", "title": "证券分析", "author": "Graham/Dodd", "category": "价值投资", "stage": 6, "diff": 5, "hours": 25, "summary": "1934年出版价值投资奠基圣经。安全边际+内在价值+市场先生。", "chapters": [{"title": "第1章·安全边际", "level": "必修", "points": [{"t": "价值-价格>30%", "c": "安全边际=内在价值-买入价格。至少30-50%安全垫。值100元60元以下才考虑。", "detail": "安全边际本质不是追求收益——是防止自己犯错。你的估值可能错、公司可能出问题。", "highlights": [{"text": "核心：安全边际=价值-价格>30%", "color": "gold"}]}]}, {"title": "第2章·市场先生", "level": "必修", "points": [{"t": "狂躁合伙人", "c": "市场先生每天报价有时极高有时极低。利用他情绪而非被情绪影响。极低=买极高=卖。", "detail": "极度悲观时买极度乐观时卖其余不理。巴菲特说投资中最重要的课。", "highlights": [{"text": "核心：利用而非被市场情绪影响", "color": "gold"}]}]}, {"title": "第3章·内在价值", "level": "推荐", "points": [{"t": "清算+盈利估值", "c": "清算价值=今日破产每股值多少。盈利估值=7-10年均EPS×合理PE。用平均防周期性高估。", "detail": "取较低者更保守。安全边际=价值-价格>30%才行动。", "highlights": [{"text": "规则：用7-10年均EPS防止高估", "color": "green"}]}]}], "knowledge_cards": [{"t": "安全边际计算", "c": "安全边际率=(内在价值-买入价)/内在价值×100%。目标>30%。内在价值=7年均EPS×合理PE。", "type": "formula"}], "quotes": ["投资的核心是用5毛钱买入价值1块钱的东西。"], "practice": []}, {"id": "b16", "title": "聪明的投资者", "author": "Benjamin Graham", "category": "价值投资", "stage": 6, "diff": 3, "hours": 14, "summary": "格雷厄姆写给普通投资者。防御型vs进攻型+股债50-50。巴菲特称有史以来最好。", "chapters": [{"title": "第1章·防御型策略", "level": "必修", "points": [{"t": "50/50+再平衡", "c": "股债各半+每半年再平衡=自动低买高卖。年化6-8%回撤<15%。", "detail": "目标：在所有环境活着。熊市债券保护牛市股票收益。最懒策略=最有效策略。", "highlights": [{"text": "规则：50/50+半年再平衡", "color": "green"}]}]}, {"title": "第2章·定投", "level": "推荐", "points": [{"t": "每月定额=长期胜出", "c": "不问价格每月定额买指数。下跌买更多上涨买更少。10年定投>90%聪明策略。", "detail": "不需要判断高低——永远是平均价格买家。", "highlights": [{"text": "规则：定投=自动摊平成本", "color": "green"}]}]}], "knowledge_cards": [{"t": "格雷厄姆数", "c": "格雷厄姆数=PE×PB。<22.5=可能低估。仅适用盈利为正+资产质量好公司。", "type": "formula"}], "quotes": ["投资的首要原则是不要亏钱，第二条是记住第一条。"], "practice": []}, {"id": "b23", "title": "巴菲特致股东的信", "author": "Warren Buffett", "category": "价值投资", "stage": 6, "diff": 3, "hours": 14, "summary": "巴菲特60年投资思想精华。护城河+安全边际+能力圈+长期复利。", "chapters": [{"title": "第1章·护城河", "level": "必修", "points": [{"t": "深度×宽度", "c": "深度=竞争优势强度宽度=持续时间。宽而深=伟大企业。评估：品牌专利网络效应规模转换成本。≥2突出=有。", "detail": "静态护城河终将被填平——只有持续创新的企业有真正护城河。", "highlights": [{"text": "核心：护城河=深度×宽度", "color": "gold"}]}]}, {"title": "第2章·能力圈", "level": "必修", "points": [{"t": "只投理解的", "c": "不理解不投=不是错过机会是避免犯错。知道自己不懂什么>知道自己懂什么。", "detail": "巴菲特每天读500页。持续阅读扩大能力圈但绝不在圈外决策。", "highlights": [{"text": "核心：知道自己边界最重要", "color": "gold"}]}]}], "knowledge_cards": [{"t": "DCF估值简化", "c": "内在价值=自由现金流×(1+增长率)^10÷(折现率-增长率)。增长5-10%折现8-10%。留30%安全边际。", "type": "formula"}], "quotes": ["别人贪婪时我恐惧，别人恐惧时我贪婪。"], "practice": []}, {"id": "b21", "title": "彼得·林奇的成功投资", "author": "Peter Lynch", "category": "选股策略", "stage": 6, "diff": 2, "hours": 12, "summary": "林奇13年年化29.2%。六类股票分类+PEG估值。观察生活发现牛股。", "chapters": [{"title": "第1章·六类股票", "level": "必修", "points": [{"t": "不同类型不同策略", "c": "缓慢增长=吃股息稳定增长=逢低买涨30-50%卖快速增长=最赚钱周期=PE最高买最低卖困境反转=高赔率隐蔽资产=资产>市值。", "detail": "用快速增长型按缓慢增长策略=坐过山车。类型搞错=策略用错=必亏。", "highlights": [{"text": "核心：不同类型=完全不同策略", "color": "gold"}]}]}, {"title": "第2章·PEG估值", "level": "推荐", "points": [{"t": "PEG=PE÷增长率", "c": "<1低估=1合理>1.5偏贵。增长率必须是预期而非历史——最大陷阱。", "detail": "30倍PE贵不贵？增长15%→PEG=2贵。增长40%→PEG=0.75便宜。PE无意义看配合什么增长率。", "highlights": [{"text": "公式：PEG=PE÷增长率<1低估", "color": "gold"}]}]}], "knowledge_cards": [{"t": "PEG三步法", "c": "①3-5年复合增长率②PE÷增长率=PEG③PEG<0.75买入0.75-1.2持有>1.5减仓。不适用周期亏损股。", "type": "formula"}], "quotes": ["你完全可以在理发的时候找到一只好股票。"], "practice": []}, {"id": "b22", "title": "战胜华尔街", "author": "Peter Lynch", "category": "选股策略", "stage": 6, "diff": 2, "hours": 12, "summary": "林奇复盘21个经典选股案例+25条黄金法则。克莱斯勒到沃尔沃实战记录。", "chapters": [{"title": "第1章·25条黄金法则", "level": "推荐", "points": [{"t": "核心法则", "c": "①投资你了解的②弄清什么类型③找业务乏味名字枯燥的④避开热门行业热门股⑤相信自己的研究。", "detail": "选5条最重要打印贴桌前。每次买入前看一遍。常识最容易被忘记。", "highlights": [{"text": "规则：选5条贴桌前每次买入前过", "color": "green"}]}]}], "knowledge_cards": [{"t": "林奇选股清单", "c": "①理解业务?②属哪类?③持多久?④何时卖?⑤最坏亏多少?五条答不上=不买。", "type": "rule"}], "quotes": ["股票投资不是脑外科手术，简单的方法往往最有效。"], "practice": []}, {"id": "b33", "title": "黑天鹅", "author": "Nassim Taleb", "category": "投资哲学", "stage": 6, "diff": 4, "hours": 14, "summary": "真正改变世界的是罕见不可预测影响巨大的黑天鹅。正态分布建模=致命。", "chapters": [{"title": "第1章·极端斯坦", "level": "必修", "points": [{"t": "平均vs极端", "c": "平均斯坦(身高体重)=正态分布适用。极端斯坦(财富金融)=少数极端值决定一切正态分布失效。", "detail": "1987黑色星期一2008危机COVID——每个都是正态认为几亿年一遇。用正态管风险=玩俄罗斯轮盘。", "highlights": [{"text": "核心：金融市场=极端斯坦", "color": "gold"}]}]}, {"title": "第2章·杠铃策略", "level": "必修", "points": [{"t": "90/10配置", "c": "90%极度安全(国债现金)10%极度冒险(期权风投)。中间全避开=有限下行+无限上行。", "detail": "90%保证不死10%博正黑天鹅。中等风险既不能保命也不暴富。永远不满仓永远不杠杆。", "highlights": [{"text": "规则：杠铃=90/10=保命+暴富", "color": "green"}]}]}], "knowledge_cards": [{"t": "杠铃配置", "c": "80-90%国债+黄金+现金10-20%冒险+虚值期权。中间=0。有限下行+无限上行。", "type": "rule"}], "quotes": ["不要试图预测黑天鹅，而要让你自己从不确定性中获益。"], "practice": []}, {"id": "b34", "title": "反脆弱", "author": "Nassim Taleb", "category": "投资哲学", "stage": 6, "diff": 4, "hours": 14, "summary": "有些系统在压力波动混乱中反而变强——反脆弱。构建反脆弱投资组合。", "chapters": [{"title": "第1章·脆弱vs反脆弱", "level": "必修", "points": [{"t": "三种状态", "c": "脆弱=波动受损坚韧=波动不变反脆弱=波动获益。好系统=反脆弱的。", "detail": "市场波动加大反而赚更多=反脆弱。只在牛市赚钱=脆弱。问：波动加大50%还能盈利？", "highlights": [{"text": "核心：反脆弱=在波动中变强", "color": "gold"}]}]}, {"title": "第2章·凸性效应", "level": "推荐", "points": [{"t": "损失有限+收益无限", "c": "损失有限+收益无限=凸性(好)。做多=凸性裸做空=凹性。现金=终极反脆弱选择权。永远不all in。", "detail": "保留可选择性。留余地在新信息出现后调整。", "highlights": [{"text": "核心：可选择性=反脆弱核心", "color": "gold"}]}]}], "knowledge_cards": [{"t": "反脆弱检查", "c": "问三问：①波动加大50%?②出现未见事件?③同跌30%能继续?任一不乐观=脆弱。", "type": "rule"}], "quotes": ["风会吹灭蜡烛，却能让火燃烧得更旺。"], "practice": []}, {"id": "b36", "title": "价值", "author": "张磊", "category": "价值投资", "stage": 6, "diff": 3, "hours": 12, "summary": "高瓴资本创始人张磊投资哲学。长期主义+研究驱动+价值创造。", "chapters": [{"title": "第1章·长期主义", "level": "必修", "points": [{"t": "流水不争先", "c": "真大钱不靠短期交易——靠长期持有最优秀公司。高瓴平均持股7-10年。", "detail": "寻找未来10-20年行业：消费升级医疗健康新能源企业服务先进制造。投进去不轻易出来。", "highlights": [{"text": "核心：长期主义=10年持有", "color": "gold"}]}]}, {"title": "第2章·动态护城河", "level": "推荐", "points": [{"t": "创新能力=真护城河", "c": "传统静态护城河在变革时代不可靠。柯达有最强胶片品牌——数码一出全没了。", "detail": "只有持续创新企业有真正护城河。价值投资不是守旧——是找到能持续创造价值的企业。", "highlights": [{"text": "核心：动态护城河=持续创新", "color": "gold"}]}]}], "knowledge_cards": [{"t": "长期主义框架", "c": "①投10年+存在行业②前2-3名③预估持5年+④研究≥3月才决策。过滤99%噪音。", "type": "rule"}], "quotes": ["流水不争先，争的是滔滔不绝。"], "practice": []}, {"id": "b37", "title": "投资中最简单的事", "author": "邱国鹭", "category": "价值投资", "stage": 6, "diff": 2, "hours": 10, "summary": "高毅资产创始人20年浓缩。便宜是硬道理+定价权+胜而后战。", "chapters": [{"title": "第1章·三好框架", "level": "必修", "points": [{"t": "好生意+好公司+好价格", "c": "好生意：毛利率>30%ROE>15%自由现金流正。好公司：双增+管理层持股。好价格：PE<行业均值20%。", "detail": "买入价格=你唯一保护。价格够低=犯错空间大。价格太高=必须永远对。把安全边际留足。", "highlights": [{"text": "核心：三好=好生意+好公司+好价格", "color": "gold"}]}]}, {"title": "第2章·宁数月亮", "level": "推荐", "points": [{"t": "选龙头不选跟风", "c": "行业第一第二不选小公司。龙头有定价权小公司被动接受价格。定价权=最强护城河。", "detail": "能涨价而不流失客户=真护城河。茅台提价照样卖完——最强竞争力。", "highlights": [{"text": "核心：定价权=最强护城河", "color": "  {"id": "s6", "name": "六阶·价值投资与复利人生", "icon": "🏛️", "sub": "从交易员到投资者", "desc": "交易让你活着，投资让你富有。格雷厄姆安全边际、巴菲特护城河、塔勒布杠铃策略——最终目标是构建能穿越周期的长期财富体系。", "books": ["b15", "b16", "b23", "b21", "b22", "b33", "b34", "b36", "b37", "b18"]}], "edges": [{"from": "b06", "to": "b17", "type": "相似", "label": "交易心态"}, {"from": "b07", "to": "b35", "type": "相似", "label": "概率思维"}, {"from": "b03", "to": "b30", "type": "相似", "label": "形态+指标"}, {"from": "b04", "to": "b30", "type": "相似", "label": "完整框架"}, {"from": "b08", "to": "b28", "type": "相似", "label": "系统化"}, {"from": "b21", "to": "b22", "type": "相似", "label": "林奇体系"}, {"from": "b31", "to": "b32", "type": "相似", "label": "大师访谈"}, {"from": "b15", "to": "b16", "type": "相似", "label": "格雷厄姆"}, {"from": "b33", "to": "b34", "type": "相似", "label": "塔勒布系列"}, {"from": "b01", "to": "b03", "type": "互补", "label": "K线+形态"}, {"from": "b05", "to": "b14", "type": "互补", "label": "系统+流程"}, {"from": "b08", "to": "b13", "type": "互补", "label": "系统+资金"}, {"from": "b13", "to": "b14", "type": "互补", "label": "资金+执行"}, {"from": "b20", "to": "b28", "type": "互补", "label": "防守+进攻"}, {"from": "b10", "to": "b11", "type": "互补", "label": "波浪+供需"}, {"from": "b23", "to": "b24", "type": "互补", "label": "巴菲特+芒格"}, {"from": "b25", "to": "b24", "type": "互补", "label": "投资+思维"}, {"from": "b36", "to": "b37", "type": "互补", "label": "PE+本土"}, {"from": "b01", "to": "b02", "type": "进阶", "label": "基础→高级"}, {"from": "b09", "to": "b03", "type": "进阶", "label": "理论→形态"}, {"from": "b06", "to": "b19", "type": "进阶", "label": "传记→操盘"}, {"from": "b03", "to": "b04", "type": "进阶", "label": "形态→框架"}, {"from": "b08", "to": "b19", "type": "进阶", "label": "系统→纪律"}, {"from": "b15", "to": "b23", "type": "进阶", "label": "格雷厄姆→巴菲特"}, {"from": "b16", "to": "b23", "type": "进阶", "label": "格雷厄姆→巴菲特"}, {"from": "b12", "to": "b29", "type": "进阶", "label": "CANSLIM→SEPA"}, {"from": "b34", "to": "b35", "type": "进阶", "label": "反脆弱→随机"}, {"from": "b06", "to": "b07", "type": "对立", "label": "直觉vs概率"}, {"from": "b08", "to":
